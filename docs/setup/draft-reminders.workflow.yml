name: Draft reminders

# Pings /api/draft-reminders every ~15 min so the pre-draft "1 day out" and
# "1 hour out" reminders fire on time. Vercel's Hobby plan caps the project at
# 2 cron jobs (see app/api/waiver-cron/route.ts), so this frequent trigger lives
# here. The daily waiver-cron also runs the same sweep as a backstop.
#
# ONE-TIME SETUP: add a repository secret named CRON_SECRET
# (Settings → Secrets and variables → Actions → New repository secret) whose
# value matches the CRON_SECRET environment variable set in Vercel. Optionally
# add a repository variable APP_URL to override the default URL below.
#
# Scheduled runs use the default branch and are free on public repos. GitHub
# may delay a run under load and disables schedules after 60 days of repo
# inactivity — both fine here (the daily Vercel cron remains a backstop).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Never run two overlapping pings.
concurrency:
  group: draft-reminders
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger draft-reminders sweep
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://fantasy-disc-golf-seven.vercel.app' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Pinging $APP_URL/api/draft-reminders"
          curl -fsS -X POST "$APP_URL/api/draft-reminders" \
            -H "Authorization: Bearer $CRON_SECRET"
          echo ""
          echo "Sweep triggered."
