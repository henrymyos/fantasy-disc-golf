<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#4B3DFF"/>
  <!-- Disc rim (outer ring) -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <!-- Disc flight plate -->
  <circle cx="16" cy="16" r="7" fill="rgba(255,255,255,0.15)"/>
  <!-- Disc center dome -->
  <circle cx="16" cy="16" r="3" fill="white" opacity="0.9"/>
  <!-- Flight arc lines -->
  <path d="M 7 11 Q 16 5 25 11" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
